<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tally Checker - Excel DB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background-color: #0d6efd; }
        .search-container { margin-top: 50px; }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="/">📊 Tally Checker</a>
        </div>
    </nav>

    <div class="container search-container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <h3 class="text-center mb-4">Cek Data Excel</h3>
                        <form action="/search" method="GET" class="d-flex gap-2">
                            <input type="text" name="q" class="form-control form-control-lg" placeholder="Masukkan kata kunci pencarian..." value="{{.Query}}" required>
                            <button type="submit" class="btn btn-primary btn-lg px-4">Cari</button>
                        </form>
                    </div>
                </div>

                {{if .Results}}
                <div class="mt-5">
                    <h4 class="mb-3">Hasil Pencarian:</h4>
                    <div class="table-responsive card shadow-sm border-0">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Nama</th>
                                    <th>Keterangan</th>
                                </tr>
                            </thead>
                            <tbody>
                                {{range .Results}}
                                <tr>
                                    <td>{{.ID}}</td>
                                    <td>{{.Name}}</td>
                                    <td>{{.Info}}</td>
                                </tr>
                                {{end}}
                            </tbody>
                        </table>
                    </div>
                </div>
                {{else if .Query}}
                <div class="alert alert-warning mt-4 text-center">
                    Data tidak ditemukan untuk kata kunci "<strong>{{.Query}}</strong>".
                </div>
                {{end}}
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
